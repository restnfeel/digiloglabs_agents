<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigiLog Labs Agents</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        max-width: 420px;
        padding: 2rem;
        border-radius: 12px;
        background: #1e293b;
        border: 1px solid #334155;
      }
      h1 {
        font-size: 1.25rem;
        margin-top: 0;
      }
      p {
        color: #94a3b8;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>DigiLog Labs Agents</h1>
      <p>오프라인 상태입니다. 인터넷에 연결한 뒤 앱을 다시 시도해 주세요.</p>
    </div>
  </body>
</html>
